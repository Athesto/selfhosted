services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    ports:
      - "${KAVITA_HTTP_PORT}:5000"
    volumes:
      - type: bind
        source: "${KAVITA_CONFIG}:/config"
        is_directory: true
      - type: bind
        source: "${KAVITA_DATA}:/data"
        is_directory: true
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
