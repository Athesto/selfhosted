services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    ports:
      - "${KAVITA_HTTP_PORT}:5000"
    volumes:
      - type: bind
        source: ${KAVITA_CONFIG}
        target: /config
        is_directory: true
      - type: bind
        source: ${KAVITA_DATA}
        target: /data
        is_directory: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/api/Health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s